name: CD

on:
  push:
    branches: [ main, staging]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Use staging environment for staging branch or when manually dispatching to staging
    environment: ${{ (github.ref == 'refs/heads/staging' || github.event.inputs.environment == 'staging') && 'staging' || 'production' }}
    # environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set deployment stage
        id: stage
        run: |
          if [ "${{ github.ref }}" = "refs/heads/staging" ] || [ "${{ github.event.inputs.environment }}" = "staging" ]; then
            echo "stage=staging" >> $GITHUB_OUTPUT
          else
            echo "stage=production" >> $GITHUB_OUTPUT
          fi


      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            cdk/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install CDK deps
        working-directory: cdk
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        # env:
        #   VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
        run: npm run ${{ steps.stage.outputs.stage == 'staging' && 'build:staging' || 'build' }}

      - name: CDK synth
        working-directory: cdk
        env:
          STAGE: ${{ steps.stage.outputs.stage }}
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          SITE_SUBDOMAIN: ${{ vars.SITE_SUBDOMAIN }}
          API_SUBDOMAIN: ${{ vars.API_SUBDOMAIN }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          REPO_NAME: ${{ vars.REPO_NAME }}
          REPO_OWNER: ${{ vars.REPO_OWNER }}
        run: npx cdk synth

      - name: CDK deploy
        working-directory: cdk
        env:
          STAGE: ${{ steps.stage.outputs.stage }}
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          SITE_SUBDOMAIN: ${{ vars.SITE_SUBDOMAIN }}
          API_SUBDOMAIN: ${{ vars.API_SUBDOMAIN }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          REPO_NAME: ${{ vars.REPO_NAME }}
          REPO_OWNER: ${{ vars.REPO_OWNER }}
        run: npx cdk deploy --all --require-approval never